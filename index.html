    // دالة استدعاء API مع Fallback بين المفاتيح
    async function callGroqWithFallback(userMessage, retryCount = 0) {
        // إذا فشلت جميع المفاتيح سابقاً
        if (allKeysFailed) {
            return "حالياً أنا خارج الخدمة، إن أردت استفسار عن أي معلومة تواصل عبر واتساب +96170257354";

        if (!currentKey || currentKey === 'gsk_placeholder_key_3_replace_me') {

        return newText;

    function addMessageToUI(text, role) {
        const chatWindow = document.getElementById('chatWindow');
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role === 'user' ? 'user-message' : 'bot-message'}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = autoLinkify(text.replace(/\n/g, '<br>'));
        msgDiv.appendChild(bubble);
        
        if (role === 'assistant') {
            const plainText = text.replace(/<[^>]*>/g, '');
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.innerHTML = '📋 نسخ';
            copyBtn.onclick = () => { navigator.clipboard.writeText(plainText); copyBtn.innerHTML = '✅ تم'; setTimeout(() => copyBtn.innerHTML = '📋 نسخ', 2000); };
            bubble.appendChild(copyBtn);
            
            const listenBtn = document.createElement('button');
            listenBtn.className = 'listen-btn';
            listenBtn.innerHTML = '🔊 استماع';
            listenBtn.onclick = () => speakText(plainText);
            bubble.appendChild(listenBtn);
        }
        
        chatWindow.appendChild(msgDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;
        if (role !== 'system') conversationHistory.push({ role: role, content: text.replace(/<[^>]*>/g, '') });
        if (conversationHistory.length > 60) conversationHistory = conversationHistory.slice(-60);
        localStorage.setItem('chat_history', JSON.stringify(conversationHistory));
    }
    
    function speakText(text) {
        if (window.speechSynthesis) {
            if (speechSynthesisUtterance) window.speechSynthesis.cancel();
            const cleanText = text.replace(/<[^>]*>/g, '');
            speechSynthesisUtterance = new SpeechSynthesisUtterance(cleanText);
            speechSynthesisUtterance.lang = 'ar-SA';
            speechSynthesisUtterance.rate = 0.9;
            window.speechSynthesis.speak(speechSynthesisUtterance);
        }
    }

    // Voice Recording
    async function startRecording() {
        if (isRecording) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onloadend = async () => {
                    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                    recognition.lang = 'ar-LB';
                    recognition.interimResults = false;
                    recognition.start();
                    recognition.onresult = (event) => {
                        const transcript = event.results[0][0].transcript;
                        document.getElementById('messageInput').value = transcript;
                        sendUserMessage(transcript);
                    };
                    recognition.onerror = () => { alert("لم يتم التعرف على الصوت"); };
                };
                reader.readAsDataURL(audioBlob);
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            isRecording = true;
            const voiceBtn = document.getElementById('voiceBtn');
            voiceBtn.style.background = "#ef4444";
            voiceBtn.innerHTML = "⏹️";
            setTimeout(() => { if (isRecording) stopRecording(); }, 10000);
        } catch (err) { alert("الجهاز لا يدعم التسجيل الصوتي"); }
    }
    
    function stopRecording() {
        if (mediaRecorder && isRecording) {

    }

        localStorage.setItem('cerebonix_theme', document.body.classList.contains('dark')?'dark':'light'); 
    }
    
    function handleLogin() {
        if(currentUser) {
            currentUser = null;
            localStorage.removeItem('cerebonix_user');
            updateUserUI();
            switchTab('chat');
            alert('تم تسجيل الخروج.');
        } else {
            let email = prompt("📧 أدخل بريدك الإلكتروني (اختياري):");
            if(email === null) return;
            let name = prompt("👤 أدخل اسمك:");
            if(name === null) return;
            if(name.trim() === "") name = "صديق";
            if(email.trim() === "") email = "غير مسجل";
            currentUser = { email: email.trim(), name: name.trim() };
            localStorage.setItem('cerebonix_user', JSON.stringify(currentUser));
            updateUserUI();
            alert(`مرحباً ${currentUser.name}!`);
            addMessageToUI(`🎉 مرحباً ${currentUser.name}، سعيد برؤيتك!`, 'assistant');
        }
    }
    
    function updateUserUI() {
        const userGreetingSpan = document.getElementById('userGreetingSpan');
        const loginLogoutBtn = document.getElementById('loginLogoutBtn');
        const settingsMenuItem = document.getElementById('settingsMenuItem');
        if (currentUser) { 
            userGreetingSpan.classList.remove('hidden'); 
            userGreetingSpan.innerHTML = `👋 أهلاً ${currentUser.name.split(' ')[0]}`; 
            loginLogoutBtn.textContent = '🚪 تسجيل خروج'; 
        } else { 
            userGreetingSpan.classList.add('hidden'); 
            loginLogoutBtn.textContent = '🔐 تسجيل دخول'; 
        }
        if (settingsMenuItem) {
            if (!currentUser) settingsMenuItem.classList.add('hidden'); 
            else settingsMenuItem.classList.remove('hidden');
        }
    }
    
    async function testAllKeys() {
        const statusDiv = document.getElementById('apiStatus');
        statusDiv.innerHTML = "⏳ جاري اختبار جميع المفاتيح...";
        let results = [];
        for (let i = 0; i < apiKeysList.length; i++) {
            const key = apiKeysList[i];
            if (!key || key === 'gsk_placeholder_key_3_replace_me') {
                results.push(`❌ المفتاح ${i+1}: غير صالح (placeholder)`);
                continue;
            }
            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: [{role:'user', content:'Hi'}], max_tokens: 5 })
                });
                if (res.ok) {
                    results.push(`✅ المفتاح ${i+1}: يعمل بشكل جيد`);
                } else {
                    results.push(`❌ المفتاح ${i+1}: فشل (${res.status})`);
                }
            } catch(e) {
                results.push(`❌ المفتاح ${i+1}: خطأ في الاتصال`);
            }
        }
        statusDiv.innerHTML = results.join('<br>');
        allKeysFailed = false;
    }
